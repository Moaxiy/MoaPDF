<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PDF 空白页插入工具</title>
    <link rel="icon" href="/codex-pdf-icon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="topbar" aria-label="PDF 工具栏">
        <div class="brand">
          <span class="brand-mark">
            <img src="/codex-pdf-icon.svg" alt="" />
          </span>
          <div>
            <h1>Codex PDF</h1>
            <p>插入空白页、删除、拆分和合并，全部在本地完成。</p>
          </div>
        </div>

        <label class="file-picker">
          <input id="pdfInput" type="file" accept="application/pdf" />
          <span>打开 PDF</span>
        </label>
      </section>

      <section class="document-bar" aria-label="当前 PDF 状态">
        <div class="status-block">
          <span class="kicker">当前文件</span>
          <strong id="fileName">尚未选择</strong>
          <span id="pageCount">选择 PDF 后显示页码</span>
        </div>

        <div class="stat-grid">
          <div>
            <span>原页数</span>
            <strong id="originalCount">0</strong>
          </div>
          <div>
            <span>空白页</span>
            <strong id="blankCount">0</strong>
          </div>
          <div>
            <span>删除页</span>
            <strong id="deletedCount">0</strong>
          </div>
          <div>
            <span>输出页数</span>
            <strong id="outputCount">0</strong>
          </div>
        </div>

        <div class="actions">
          <button id="downloadBtn" class="primary" disabled>下载处理后 PDF</button>
          <button id="resetBtn" class="secondary" disabled>清空操作</button>
        </div>
      </section>

      <section class="workspace">
        <section class="pages-panel" aria-label="页码列表">
          <div class="empty-state" id="emptyState">
            <strong>选择一个 PDF 开始</strong>
            <span>页面会按原始页码排列，每一行都可以单独添加空白页。</span>
          </div>
          <div class="page-list" id="pageList"></div>
        </section>

        <aside class="tools-panel" aria-label="PDF 工具">
          <p class="hint">
            插入位置始终按原始 PDF 页码计算，已生成页面不会反向影响页码。
          </p>

          <div class="split-tool" aria-label="拆分 PDF">
            <div>
              <strong>拆分 PDF</strong>
              <span>输入页码范围导出新文件</span>
            </div>
            <input id="splitRangeInput" type="text" placeholder="例如 1-3, 6, 9-12" />
            <button id="splitDownloadBtn" class="secondary" disabled>下载拆分 PDF</button>
          </div>

          <section class="merge-panel" aria-label="PDF 合并">
            <div class="merge-head">
              <div>
                <strong>合并 PDF</strong>
                <span>按列表顺序合并多个文件</span>
              </div>
              <label class="file-picker merge-picker">
                <input id="mergeInput" type="file" accept="application/pdf" multiple />
                <span>选择多个</span>
              </label>
            </div>
            <div class="merge-empty" id="mergeEmpty">选择两个或更多 PDF 后开始合并</div>
            <div class="merge-list" id="mergeList"></div>
            <div class="merge-actions">
              <button id="mergeDownloadBtn" class="primary" disabled>下载合并 PDF</button>
              <button id="mergeClearBtn" class="secondary" disabled>清空列表</button>
            </div>
          </section>

          <section class="preview-panel" aria-label="最终页序预览">
            <div class="preview-head">
              <strong>最终页序</strong>
              <span>下载后的物理页顺序</span>
            </div>
            <div class="preview-empty" id="previewEmpty">选择 PDF 后显示预览</div>
            <div class="preview-list" id="previewList"></div>
          </section>
        </aside>
      </section>
    </main>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
